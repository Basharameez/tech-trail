<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Leaderboard - Tech In My Style</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <!-- Chart.js and Data Labels plugin -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.2.0/dist/chartjs-plugin-datalabels.min.js"></script>

  <style>
    :root {
      --primary: #4955ed;
      --primary-accent: #70f2ea;
      --bg: #f3f8fe;
      --card: rgba(255,255,255,0.97);
      --glass: rgba(255,255,255,0.77);
      --text: #22294d;
      --header-bg: linear-gradient(101deg,#5f87f7 66%,#97b9f9);
      --header-text: #fff;
      --shadow: 0 8px 40px 0 rgba(30,60,160,0.17);
      --gold: #FFD700;
      --silver: #C0C0C0;
      --bronze: #CD7F32;
      --medal-btn: #f7b940;
      --table-row-hover: #e6f1fd;
      --card-shadow: 0 2px 24px 0 #93aae10e;
      --input-bg: #f8fbff;
      --input-focus: #d6eeff;
      --input-shadow: 0 1.5px 8px #4caf502b;
    }
    body.dark {
      --bg: #191c28;
      --card: rgba(34,34,53,0.98);
      --glass: rgba(31,32,51,0.82);
      --text: #eaefff;
      --header-bg: linear-gradient(90deg,#363996 55%,#019bbe 100%);
      --header-text: #fff;
      --shadow: 0 7px 36px #0c153e54;
      --table-row-hover: #2a334d;
      --card-shadow: 0 2px 12px #0b133375;
      --input-bg: #23263a;
      --input-focus: #263356;
      --input-shadow: 0 3px 12px #30dafb20;
    }
    html, body {
      min-height: 100%;
      background: var(--bg);
      color: var(--text);
      margin: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }
    body {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 3.7vw 0 32px 0;
      transition: background 0.3s;
    }
    .container {
      max-width: 980px;
      width: 98%;
      margin: auto;
      background: var(--card);
      border-radius: 21px;
      box-shadow: var(--shadow);
      overflow: hidden;
      padding-bottom: 26px;
      transition: background 0.3s;
    }
    .leaderboard-header {
      background: var(--header-bg);
      padding: 45px 24px 25px 24px;
      text-align: center;
      border-radius: 0 0 27px 27px;
      position: relative;
      box-shadow: 0 6px 18px #4988f407;
      z-index: 2;
    }
    .leaderboard-header h1 {
      color: var(--header-text);
      font-size: 2.7rem;
      margin: 0 0 12px 0;
      font-weight: 900;
      letter-spacing: 0.9px;
      text-shadow: 0 2px 12px #2a436533;
    }
    .leaderboard-header p {
      color: var(--header-text);
      font-size: 1.14rem;
      opacity: 0.89;
      margin: 0;
      font-weight: 500;
      letter-spacing: 0.05em;
      text-shadow: 0 1px 12px #181e4479;
    }
    .controls {
      display: flex;
      align-items: center;
      gap: 17px;
      padding: 27px 36px 19px 36px;
      background: var(--glass);
      box-shadow: var(--card-shadow);
      border-radius: 17px 17px 0 0;
      margin-top: -22px;
      position: relative;
      z-index: 4;
      backdrop-filter: blur(10px);
    }
    input[type="text"], select {
      padding: 14px 15px;
      border-radius: 9px;
      border: 1.6px solid #daeefd;
      font-size: 16.2px;
      outline: none;
      background: var(--input-bg);
      color: var(--text);
      transition: border-color 0.18s, background 0.18s, box-shadow 0.18s;
      box-shadow: var(--input-shadow);
    }
    input[type="text"]:focus, select:focus {
      border-color: var(--primary-accent);
      background: var(--input-focus);
      color: #111;
      box-shadow: 0 2px 10px #58ccf733;
    }
    select { min-width: 130px; }
    .spacer { flex: 1; }
    button.theme-toggle {
      background: linear-gradient(97deg, #4955ed 60%, #09e3d7 120%);
      color: white;
      border: none;
      padding: 9px 21px;
      border-radius: 7.4px;
      cursor: pointer;
      font-size: 18px;
      font-weight: 700;
      box-shadow: 0 4px 10px #12f2e13b;
      transition: background 0.19s, box-shadow 0.12s;
      position: relative;
      outline: none;
      min-width: 44px;
      min-height: 44px;
    }
    button.theme-toggle:focus { outline: 2.3px solid #08e4e1; }
    button.theme-toggle:hover, button.theme-toggle[aria-pressed="true"] {
      background: linear-gradient(90deg, #09e3d7 52%, #4955ed 155%);
      box-shadow: 0 6px 22px #09e3d71d;
    }
    .leaderboard-table-wrap {
      overflow-x: auto;
      margin: 0 17px 33px 17px;
      border-radius: 17px;
      background: var(--glass);
      box-shadow: var(--card-shadow);
      transition: background 0.25s;
      backdrop-filter: blur(5px);
    }
    table {
      width: 100%;
      border-collapse: separate;
      border-spacing: 0;
      margin-bottom: 8px;
      font-size: 16.2px;
      min-width: 420px;
      border-radius: 13px;
      table-layout: auto;
      background: transparent;
    }
    th {
      background: #dde9fd;
      color: #3955ad;
      padding: 18px 6px;
      letter-spacing: 0.63px;
      font-size: 15.7px;
      font-weight: 800;
      border-bottom: 2px solid #a9cafa;
      user-select: none;
      text-transform: uppercase;
      transition: background 0.2s, color 0.2s;
    }
    td {
      text-align: center;
      padding: 16px 10px;
      font-weight: 600;
      border-bottom: 1px solid #e7eafd;
      user-select: text;
      vertical-align: middle;
      background: transparent;
      position: relative;
      transition: background 0.13s;
    }
    td.user-cell {
      display: flex;
      align-items: center;
      gap: 14px;
      justify-content: flex-start;
      text-align: left;
      font-size: 1.12rem;
      font-weight: 700;
      transition: color 0.2s;
    }
    .rank-medal {
      font-size: 1.43rem;
      font-family: "Apple Color Emoji","Segoe UI Emoji","Segoe UI Symbol","Noto Color Emoji",sans-serif;
      user-select: none;
      vertical-align: middle;
      filter: drop-shadow(0 1.5px 13px #ffdc3e26);
    }
    .gold { color: var(--gold); }
    .silver { color: var(--silver); }
    .bronze { color: var(--bronze); }
    tr.top-row {
      font-weight: 900;
      background: #fffdf0 !important;
      border-left: 10px solid var(--gold);
      box-shadow: 0 1px 11px #ffe9851c;
    }
    tr:hover td {
      background: var(--table-row-hover);
      cursor: pointer;
      color: #365ad5;
      transition: background 0.16s, color 0.15s;
    }
    tr.top-row:hover td {
      background: #fff7cd;
      color: #a08000;
    }
    body.dark th { background: #292e56; color: #80f6f2; }
    body.dark tr.top-row { background: #23263a !important; }
    body.dark tr:hover td, body.dark tr.top-row:hover td {
      background: var(--table-row-hover) !important;
      color: #87e6f4 !important;
    }
    a.user-link {
      color: #4955ed;
      text-decoration: none;
      font-weight: 800;
      font-size: 1.07em;
      border-bottom: 1.8px dotted #70f2ea77;
      border-radius: 3px;
      transition: all 0.13s;
      cursor: pointer;
      outline: none;
    }
    a.user-link:hover, a.user-link:focus {
      text-decoration: underline;
      background: #f7fdff;
      color: #29c2c9;
    }
    .avatar {
      width: 43px;
      height: 43px;
      box-shadow: 0 2px 16px #70f2ea1c;
      background: linear-gradient(135deg,#edfcfa 72%, #bfe6f8 100%);
      border-radius: 50%;
      padding: 2px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      color: #4955ed;
      font-size: 1.27rem;
      border: 2.3px solid #f1f8fc;
      margin-right: 7px;
      transition: box-shadow 0.19s, background 0.19s;
    }
    body.dark .avatar {
      background: linear-gradient(135deg,#232945 68%, #43e6f8 96%);
      color: #70f2ea;
      border: 2.7px solid #21243a;
    }
    .back-btn {
      margin: 31px 28px 15px 28px;
      display: block;
      width: auto;
      padding: 13px 38px;
      font-size: 1.15rem;
      border-radius: 10px;
      background: linear-gradient(100deg, #4955ed 60%, #09e3d7 130%);
      color: white;
      font-weight: 800;
      border: none;
      cursor: pointer;
      letter-spacing: 0.15px;
      box-shadow: 0 6px 22px #545aec2e;
      transition: background 0.22s, box-shadow 0.17s;
    }
    .back-btn:hover {
      background: linear-gradient(95deg, #33d6d4 39%, #4955ed 108%);
      box-shadow: 0 8px 22px #09e3af27;
    }
    canvas {
      max-width: 96%;
      margin: 28px auto 0 auto;
      display: block;
      border-radius: 22px;
      background: var(--glass);
      box-shadow: var(--card-shadow);
      transition: background 0.22s;
    }
    #progressModal {
      display: none;
      position: fixed;
      z-index: 1020;
      top: 0; left: 0;
      width: 100vw; height: 100vh;
      background: rgba(28,37,65,0.40);
      align-items: center;
      justify-content: center;
      padding: 10px;
      overflow-y: auto;
      animation: fadeInBackdrop 0.3s;
    }
    @keyframes fadeInBackdrop {
      from { background: rgba(0,0,0,.08);}
      to   { background: rgba(28,37,65,.40);}
    }
    #progressModal > div {
      background: var(--glass);
      border-radius: 16px;
      padding: 37px 34px 31px 34px;
      max-width: 1000px;
      width: 98%;
      min-width: 276px;
      max-height: 90vh;
      box-shadow: 0 20px 58px #1e517f22;
      backdrop-filter: blur(17px) saturate(125%);
      display: flex;
      gap: 33px;
      color: var(--text);
      position: relative;
      flex-direction: column;
      align-items: stretch;
      animation: zoomInModal .18s;
      overflow-y: auto;
    }
    @keyframes zoomInModal {
      from { transform: scale(0.96); opacity:0.88;}
      to { transform: scale(1); opacity:1;}
    }
    .closeModalBtn {
      position: absolute;
      top: 12px;
      right: 17px;
      font-size: 32px;
      background: none;
      border: none;
      cursor: pointer;
      color: var(--text);
      z-index: 12;
      user-select: none;
      padding: 0;
      transition: color 0.17s;
    }
    .closeModalBtn:hover { color: #ea5252; }
    #modalUser {
      font-weight: 800;
      font-size: 1.39rem;
      color: #3dd2ef;
      margin-bottom: 13px;
      text-align: center;
      letter-spacing: 0.77px;
      text-shadow: 0 1px 7px #08e4e14d;
    }
    .modal-content-bottom {
      display: flex;
      flex-wrap: wrap;
      gap: 33px 23px;
      justify-content: center;
      margin-top: 12px;
    }
    .chart-card, .modal-table-wrap {
      background: var(--card);
      border-radius: 17px;
      box-shadow: var(--card-shadow);
      padding: 21px 14px 24px 14px;
      margin-bottom: 18px;
      transition: background 0.2s;
    }
    #progressTable {
      width: 100%;
      border-collapse: separate;
      border-spacing: 0 8px;
      font-size: 15.2px;
      background: var(--card);
      border-radius: 12px;
      box-shadow: 0 1.5px 10px #7e97fd27;
      overflow: hidden;
      margin-bottom: 4px;
      letter-spacing: 0.12px;
    }
    #progressTable th, #progressTable td {
      padding: 13px 11px;
      text-align: center;
      background-color: #e1f6fcbe;
      border-bottom: none;
      font-weight: 700;
      color: var(--primary);
      border-radius: 6.3px 6.3px 0 0;
    }
    #progressTable th {
      background-color: #39ecdf;
      color:#4045bd;
      user-select: none;
      border-radius: 6.3px 6.3px 0 0;
      font-weight: 900;
      letter-spacing: 0.21px;
      box-shadow: 0 2px 7px #55f9ef11;
    }
    @media (max-width: 900px) {
      #progressModal > div {
        max-height: 95vh;
        padding: 17px 2vw 17px 2vw;
      }
      .modal-content-bottom {
        flex-wrap: wrap;
        flex-direction: column;
        gap: 22px 0;
      }
    }
    @media (max-width:650px) {
      .container { padding-bottom: 7px; }
      .controls, .leaderboard-table-wrap, .back-btn { margin-left: 0; margin-right: 0; }
      .leaderboard-header { padding: 32px 2vw 11px 2vw;}
      .controls { padding: 16px 10px; gap: 8px;}
      .back-btn { padding: 10px 13px;}
      canvas { margin-top: 19px; }
      .modal-content-bottom { gap: 12px 0;}
      #progressModal > div {padding: 13px 2vw 14px 2vw;}
    }
    @media (max-width:400px) {
      .container, #progressModal > div { padding: 0 !important; }
      .leaderboard-header h1 { font-size: 1.18rem;}
      th, td, input, select { font-size: 12px !important; }
    }
  </style>
</head>
<body>
  <div class="container" role="main">
    <section class="leaderboard-header">
      <h1>🏆 Leaderboard</h1>
      <p>Click a username for full course progress details.</p>
    </section>
    <section class="controls" aria-label="Search and filter leaderboard">
      <input type="text" id="searchInput" aria-label="Search user" placeholder="🔍 Search user..." />
      <select id="sortSelect" aria-label="Sort leaderboard">
        <option value="rank">Sort by Rank</option>
        <option value="user">Sort by User</option>
        <option value="score">Sort by Score</option>
      </select>
      <span class="spacer" aria-hidden="true"></span>
      <button class="theme-toggle" aria-pressed="false" aria-label="Toggle dark/light theme" onclick="toggleTheme()">🌙 Toggle Theme</button>
    </section>
    <section class="leaderboard-table-wrap" aria-label="Leaderboard table">
      <table>
        <thead>
          <tr>
            <th scope="col">Rank</th>
            <th scope="col">User</th>
            <th scope="col">Total Tasks</th>
          </tr>
        </thead>
        <tbody id="board" role="rowgroup"></tbody>
      </table>
    </section>
    <canvas id="scoreChart" height="90" role="img" aria-label="Bar chart of total tasks completed by users"></canvas>
    <button class="back-btn" onclick="goHome()">⬅ Back to Dashboard</button>
  </div>

  <!-- Modal -->
  <div id="progressModal" role="dialog" aria-modal="true" aria-labelledby="modalUser" tabindex="-1">
    <div>
      <button class="closeModalBtn" onclick="closeModal()" aria-label="Close modal">&times;</button>
      <div id="modalUser" aria-live="polite">User Progress</div>
      <div class="modal-content-bottom">
        <div class="modal-table-wrap chart-card">
          <table id="progressTable" aria-label="Course-wise progress table" hidden>
            <thead><tr><th>Course Name</th><th>Tasks Completed</th></tr></thead>
            <tbody id="progressTableBody"></tbody>
          </table>
        </div>
        <div class="modal-chart-wrap chart-card">
          <canvas id="userProgressChart" width="360" height="300"></canvas>
        </div>
        <!-- All other "per course" tables and charts have been removed -->
      </div>
    </div>
  </div>

<script>
  Chart.register({
    id: 'customBgCard',
    beforeDraw: (chart) => {
      const ctx = chart.canvas.getContext('2d');
      ctx.save();
      ctx.globalCompositeOperation = 'destination-over';
      ctx.fillStyle = getComputedStyle(document.body).getPropertyValue('--card') || '#fff';
      ctx.fillRect(0, 0, chart.width, chart.height);
      ctx.restore();
    }
  });

  let leaderboardData = [];
  let courseTotals = {};
  let currentUserProgress = null;
  let progressChartInstance = null;

  Chart.register(ChartDataLabels);

  const medals = [
    '<span class="rank-medal gold">🥇</span>',
    '<span class="rank-medal silver">🥈</span>',
    '<span class="rank-medal bronze">🥉</span>'
  ];
  const chartCtx = document.getElementById('scoreChart').getContext('2d');
  let scoreChart;

  function getInitials(name) {
    if (!name) return "U";
    const parts = name.split(/[ ._]/).filter(Boolean);
    return parts.length === 1 ? parts[0][0].toUpperCase() : (parts[0][0] + parts[1][0]).toUpperCase();
  }

  function renderTable(data) {
    const tbody = document.getElementById("board");
    tbody.innerHTML = "";
    data.forEach((userData, i) => {
      tbody.innerHTML += `
        <tr class="${i < 3 ? 'top-row' : ''}">
          <td>${i < 3 ? medals[i] : (i + 1)}</td>
          <td class="user-cell">
            <span class="avatar">${getInitials(userData.user)}</span>
            <a href="#" class="user-link" data-username="${userData.user}" tabindex="0">${userData.user}</a>
          </td>
          <td>${userData.score}</td>
        </tr>
      `;
    });
  }

  function updateChart(data) {
    const labels = data.map(u => u.user);
    const scores = data.map(u => u.score);
    if(scoreChart) scoreChart.destroy();
    scoreChart = new Chart(chartCtx, {
      type: 'bar',
      data: {
        labels,
        datasets: [{
          label: 'Total Tasks Completed',
          data: scores,
          backgroundColor: '#4955ed',
        }],
      },
      options: {
        responsive: true,
        plugins: {
          legend: {display: false}
        },
        scales: {
          y: {
            beginAtZero: true,
            ticks: { stepSize: 1 }
          }
        }
      }
    });
  }

  function applySearchAndSort() {
    const searchTerm = document.getElementById('searchInput').value.trim().toLowerCase();
    const sortValue = document.getElementById('sortSelect').value;

    let filtered = leaderboardData.filter(u => u.user.toLowerCase().includes(searchTerm));
    if(sortValue === "user") {
      filtered.sort((a,b) => a.user.localeCompare(b.user));
    } else if(sortValue === "score") {
      filtered.sort((a,b) => b.score - a.score);
    }

    renderTable(filtered);
    updateChart(filtered);
  }

  async function loadCourseTotals() {
    try {
      const res = await fetch('https://tech-trail-w2ap.onrender.com/courses/meta');
      if(!res.ok) throw new Error("Failed to fetch course totals");
      courseTotals = await res.json();
    } catch {
      // Fallback: just set same number for each
      courseTotals = {
        "ai": 10, "ml": 10, "dl": 10, "java": 10, "c": 10,
        "html": 10, "css": 10, "js": 10, "js-intermediate": 10,
        "python": 10, "dsc": 10
      };
    }
  }

  async function loadBoard() {
    await loadCourseTotals();
    try {
      const res = await fetch('https://tech-trail-w2ap.onrender.com/leaderboard');
      if (!res.ok) throw new Error("Failed to fetch leaderboard");
      leaderboardData = await res.json();
      renderTable(leaderboardData);
      updateChart(leaderboardData);
    } catch(e) {
      document.getElementById("board").innerHTML = `<tr><td colspan="3">⚠️ Failed to load leaderboard.</td></tr>`;
      console.error(e);
    }
  }

  function toggleTheme() {
    const body = document.body;
    body.classList.toggle('dark');
    const themeBtn = document.querySelector('.theme-toggle');
    themeBtn.setAttribute('aria-pressed', body.classList.contains('dark'));
  }

  function goHome() {
    window.location.href = "../index.html";
  }

  function closeModal() {
    if(progressChartInstance) {
      progressChartInstance.destroy();
      progressChartInstance = null;
    }
    document.getElementById('progressModal').style.display = 'none';
  }

  function renderProgressChart() {
    if (!currentUserProgress) return;
    const ctx = document.getElementById('userProgressChart').getContext('2d');
    if(progressChartInstance){
      progressChartInstance.destroy();
      progressChartInstance = null;
    }

    const labels = Object.keys(currentUserProgress);
    const data = labels.map(c => currentUserProgress[c].length);
    const bgColors = [
      "#4955ed", "#70f2ea", "#fed766", "#d7263d", "#63ffc3",
      "#b192f7", "#57b7fc", "#f299af", "#e56b6f", "#2981f2"
    ];

    progressChartInstance = new Chart(ctx, {
      type: 'pie',
      data: {
        labels: labels.length > 0 ? labels : ['No Progress'],
        datasets: [{
          data: data.length > 0 ? data : [1],
          backgroundColor: bgColors.slice(0, labels.length),
        }]
      },
      options: {
        responsive: true,
        plugins: {
          legend: {display: true, position: 'bottom'},
          datalabels: {
            color: "#fff",
            font: {weight: 'bold', size: 15},
            formatter: (value, context) => {
              const total = context.chart._metasets[context.datasetIndex].total;
              if(total === 0) return '0%';
              return ((value / total) * 100).toFixed(1) + '%';
            }
          }
        }
      },
      plugins: [ChartDataLabels]
    });
  }

  async function loadUserProgress(username){
    const modalUser = document.getElementById('modalUser');
    modalUser.textContent = `Course Progress for ${username}`;
    const modal = document.getElementById('progressModal');
    modal.style.display = 'flex';
    currentUserProgress = null;
    const progressTable = document.getElementById('progressTable');
    const progressTableBody = document.getElementById('progressTableBody');
    progressTable.hidden = true;
    progressTableBody.innerHTML = '';
    try {
      const res = await fetch(`https://tech-trail-w2ap.onrender.com/progress/${encodeURIComponent(username)}`);
      if(!res.ok) throw new Error("Failed to fetch user progress");
      const prog = await res.json();
      currentUserProgress = prog;
      const courses = Object.keys(prog);
      if(courses.length === 0) {
        progressTableBody.innerHTML = `<tr><td colspan="2">No task progress found for this user.</td></tr>`;
      } else {
        progressTableBody.innerHTML = courses.map(course => {
          const taskCount = prog[course].length;
          return `<tr><td>${course}</td><td>${taskCount}</td></tr>`;
        }).join('');
      }
      progressTable.hidden = false;
      renderProgressChart();
    } catch(e) {
      progressTableBody.innerHTML = `<tr><td colspan="2" style="color:#ea5252;">Failed to load progress data.</td></tr>`;
      progressTable.hidden = false;
      console.error(e);
    }
  }

  // Event listeners
  document.addEventListener('click', function(e){
    if(e.target.classList.contains('user-link')){
      e.preventDefault();
      loadUserProgress(e.target.getAttribute('data-username'));
    }
  });
  document.getElementById("searchInput").addEventListener("input", applySearchAndSort);
  document.getElementById("sortSelect").addEventListener("change", applySearchAndSort);
  loadBoard();
</script>
</body>
</html>

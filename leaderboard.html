<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Leaderboard - Tech In My Style</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <!-- Chart.js and Data Labels plugin -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.2.0/dist/chartjs-plugin-datalabels.min.js"></script>

  <style>
    :root {
      --primary: #2e375c;
      --primary-accent: #3574e6;
      --bg: #f7faff;
      --card: #fff;
      --card-dark: #23263a;
      --text: #23263a;
      --header-bg: #3950a1;
      --header-text: #fff;
      --shadow: 0 8px 32px rgba(45,68,136,0.13);
      --gold: #FFD700;
      --silver: #C0C0C0;
      --bronze: #CD7F32;
      --table-row-hover: #e7f0ff;
      --card-shadow: 0 2px 14px #b7cfff17;
    }
    body.dark {
      --bg: #181a33;
      --card: #21243a;
      --text: #e2e7fb;
      --header-bg: #23263a;
      --header-text: #fff;
      --shadow: 0 8px 32px rgba(13,20,60,0.21);
      --table-row-hover: #252749;
      --card-shadow: 0 4px 16px #090b1a3b;
    }
    html, body {
      min-height: 100%;
      background: var(--bg);
      color: var(--text);
      margin: 0;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
    }
    body {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 40px 0 40px 0;
    }
    .container {
      max-width: 980px;
      width: 98%;
      margin: auto;
      background: var(--card);
      border-radius: 18px;
      box-shadow: var(--shadow);
      overflow: hidden;
      padding-bottom: 24px;
      transition: background 0.3s;
    }
    .leaderboard-header {
      background: var(--header-bg);
      padding: 40px 24px 24px 24px;
      text-align: center;
      border-radius: 0 0 22px 22px;
      box-shadow: 0 6px 14px rgba(68,104,218,0.06);
    }
    .leaderboard-header h1 {
      color: var(--header-text);
      font-size: 2.5rem;
      margin: 0 0 10px;
      font-weight: bold;
      letter-spacing: 1px;
      text-shadow: 0 2px 8px #375fa91a;
    }
    .leaderboard-header p {
      color: var(--header-text);
      font-size: 1.10rem;
      letter-spacing: 0.2px;
      opacity: 0.84;
      margin: 0;
      font-weight: 500;
    }
    .controls {
      display: flex;
      align-items: center;
      gap: 20px;
      padding: 23px 33px;
      background: var(--card);
      box-shadow: var(--card-shadow);
      position: relative;
      margin-bottom: 3px;
      border-radius: 15px 15px 0 0;
      z-index: 3;
    }
    input[type="text"], select {
      padding: 11px 15px;
      border-radius: 8px;
      border: 1.5px solid #e3e8f3;
      font-size: 16px;
      min-width: 156px;
      outline: none;
      background: var(--bg);
      color: var(--text);
      transition: border-color 0.17s, background 0.18s;
      box-shadow: 0 1px 2px #d1d4ee14;
    }
    input[type="text"]:focus, select:focus {
      border-color: var(--primary-accent);
      background: #eef4ff;
      color: var(--primary);
    }
    select { min-width: 128px; }
    .spacer { flex: 1; }
    button.theme-toggle {
      background: linear-gradient(92deg, #3574e6 70%, #3357c0 100%);
      color: white;
      border: none;
      padding: 9px 18px;
      border-radius: 7px;
      cursor: pointer;
      font-size: 17px;
      font-weight: 600;
      letter-spacing: 0.1px;
      box-shadow: 0 2px 8px #3574e626;
      transition: background 0.14s;
      outline: none;
    }
    button.theme-toggle:focus { outline: 2px solid #596aff; }
    button.theme-toggle:hover, button.theme-toggle[aria-pressed="true"] {
      background: linear-gradient(92deg, #3357c0 70%, #3574e6 100%);
    }
    .leaderboard-table-wrap {
      overflow-x: auto;
      margin: 0 19px 28px 19px;
      border-radius: 16px;
      background: var(--card);
      box-shadow: var(--card-shadow);
      transition: background 0.25s;
    }
    table {
      width: 100%;
      border-collapse: separate;
      border-spacing: 0;
      margin-bottom: 8px;
      background: transparent;
      font-size: 16px;
      min-width: 410px;
      border-radius: 12px;
      overflow: hidden;
      table-layout: auto;
    }
    th {
      background: #f2f6fd;
      color: #2b3e8d;
      padding: 15px 6px;
      letter-spacing: 0.58px;
      font-size: 15px;
      font-weight: 800;
      border-bottom: 2px solid #e8ebf3;
      user-select: none;
      text-transform: uppercase;
    }
    td {
      text-align: center;
      padding: 15px 8px;
      font-weight: 500;
      border-bottom: 1px solid #e4eaf6;
      background: transparent;
      user-select: text;
      vertical-align: middle;
    }
    td.user-cell {
      display: flex;
      align-items: center;
      gap: 15px;
      justify-content: flex-start;
      text-align: left;
      font-size: 1.07rem;
      font-weight: 600;
    }
    .rank-medal {
      font-size: 1.37rem;
      font-family: "Apple Color Emoji", "Segoe UI Emoji", "Segoe UI Symbol", "Noto Color Emoji", sans-serif;
      user-select: none; vertical-align: middle;
    }
    .gold { color: var(--gold); filter: drop-shadow(0 0 2px #ffe47a); }
    .silver { color: var(--silver); }
    .bronze { color: var(--bronze); }
    tr.top-row {
      font-weight: 800;
      background: #faf6ea !important;
      border-left: 6.5px solid #e8cb6b;
      box-shadow: 0 1px 8px #ffd70010;
    }
    tr:hover td {
      background: var(--table-row-hover);
      cursor: pointer;
      transition: background 0.13s;
    }
    tr.top-row:hover td {
      background: #fcf2cd;
    }
    body.dark tr:hover td, body.dark tr.top-row:hover td {
      background: var(--table-row-hover);
    }
    a.user-link {
      color: #3574e6;
      text-decoration: none;
      font-weight: 700;
      font-size: 1.05em;
      border-bottom: 1.5px dotted #615bea7d;
      border-radius: 3px;
      transition: all 0.17s;
      cursor: pointer;
      outline: none;
    }
    a.user-link:focus, a.user-link:hover {
      text-decoration: underline;
      background: #e6edfc;
      color: #2856b6;
    }
    a.user-link:active {
      color: #183992;
    }
    .avatar {
      width: 38px;
      height: 38px;
      box-shadow: 0 2px 8px #dde2fa27;
      background: linear-gradient(132deg,#e7ecff 74%, #bfc8f7 100%);
      border-radius: 50%;
      padding: 2px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      color: #3d57a1;
      font-size: 1.27rem;
      border: 2px solid #f7faff;
      margin-right: 4px;
    }
    body.dark .avatar {
      background: linear-gradient(132deg,#232945 74%, #394877 100%);
      color: #a5b9ea;
      border: 2.5px solid #24263b;
    }
    .back-btn {
      margin: 28px 24px 13px 24px;
      display: block;
      width: auto;
      padding: 13px 32px;
      font-size: 1.09rem;
      border-radius: 9px;
      background: linear-gradient(135deg, #2e375c, #5a75be 90%);
      color: white;
      font-weight: 600;
      border: none;
      cursor: pointer;
      letter-spacing: 0.3px;
      box-shadow: 0 2px 12px #2257c22d;
      transition: background 0.18s, box-shadow 0.13s;
      user-select: none;
    }
    .back-btn:hover {
      background: linear-gradient(135deg, #233165, #3e60b9 82%);
      box-shadow: 0 3px 18px #6677c74b;
    }
    canvas {
      max-width: 96%;
      margin: 22px auto 0 auto;
      display: block;
      border-radius: 1.5em;
      background: var(--card);
      box-shadow: var(--card-shadow);
      transition: background 0.22s;
    }
    /* Modal styles w/ enhancements */
    #progressModal {
      display: none;
      position: fixed;
      z-index: 1010;
      top: 0; left: 0;
      width: 100vw; height: 100vh;
      background: rgba(29,36,62,0.40);
      align-items: center;
      justify-content: center;
      padding: 10px;
      overflow-y: auto;
      animation: fadeInBackdrop 0.3s;
    }
    @keyframes fadeInBackdrop {
      from { background: rgba(0,0,0,0.01); }
      to   { background: rgba(29,36,62,0.40);}
    }
    #progressModal > div {
      background: var(--card);
      border-radius: 15px;
      padding: 32px 34px 27px 34px;
      max-width: 1000px;
      width: 98%;
      min-width: 290px;
      max-height: 88vh;
      box-shadow: 0 14px 48px #16234c31;
      display: flex;
      gap: 36px;
      color: var(--text);
      position: relative;
      flex-direction: column;
      align-items: stretch;
      animation: zoomInModal .23s;
      overflow-y: auto;
    }
    @keyframes zoomInModal {
      from { transform: scale(0.95); opacity:0.84;}
      to { transform: scale(1); opacity:1;}
    }
    .closeModalBtn {
      position: absolute;
      top: 12px;
      right: 18px;
      font-size: 27px;
      background: none;
      border: none;
      cursor: pointer;
      color: var(--text);
      z-index: 12;
      user-select: none;
      padding: 0;
      transition: color 0.17s;
    }
    .closeModalBtn:hover { color: #ea5252; }
    #modalUser {
      font-weight: 700;
      font-size: 1.35rem;
      color: var(--primary-accent);
      margin-bottom: 18px;
      text-align: center;
      letter-spacing: 0.7px;
    }
    .modal-content-bottom {
      display: flex;
      flex-wrap: wrap;
      gap: 30px 24px;
      justify-content: center;
    }
    .chart-card, .modal-table-wrap, .modal-chart-wrap {
      background: var(--card);
      border-radius: 13px;
      box-shadow: var(--card-shadow);
      padding: 18px 11px 21px 11px;
      margin-bottom: 18px;
      transition: background 0.2s;
    }
    #progressTable, #userCourseProgressTable, #courseSummaryTable {
      width: 100%;
      border-collapse: separate;
      border-spacing: 0 8px;
      font-size: 15px;
      background: var(--card);
      border-radius: 12px;
      box-shadow: 0 1px 6px #c8cffc27;
      overflow: hidden;
      margin-bottom: 6px;
      letter-spacing: 0.1px;
    }
    #progressTable th, #progressTable td,
    #userCourseProgressTable th, #userCourseProgressTable td,
    #courseSummaryTable th, #courseSummaryTable td {
      padding: 12px 11px;
      text-align: center;
      background-color: #f8fbff;
      border-bottom: none;
      font-weight: 600;
      color: var(--text);
    }
    #progressTable th, #userCourseProgressTable th, #courseSummaryTable th {
      background-color: #4471e2;
      color: #fff;
      user-select: none;
      font-weight: 900;
      letter-spacing: 0.2px;
      border-radius: 4px 4px 0 0;
    }
    #userCourseProgressTable td { cursor: pointer; font-weight: 600; }
    #userCourseProgressTable tr:hover td {
      background-color: #e3eafc;
      color: #2856b6;
      transition: background 0.13s;
    }
    #userCourseProgressTable tr td:first-child {
      text-align: left;
      font-weight: 700;
      color: #4471e2;
    }
    body.dark #progressTable th, body.dark #userCourseProgressTable th, body.dark #courseSummaryTable th {
      background-color: #2c3873;
      color: #fff;
    }
    body.dark #userCourseProgressTable td, body.dark #userCourseProgressTable tr:hover td {
      background-color: #23263a;
      color: var(--text);
    }
    #courseSummarySelect {
      font-size: 15px;
      border-radius: 7px;
      border: 1.4px solid #d7def4;
      appearance: none;
      cursor: pointer;
      margin-bottom: 13px;
      padding: 8px 12px;
      width: 100%;
      font-weight: 500;
      background: #f4fafd;
      color: var(--primary);
      transition: border 0.16s;
    }
    #courseSummarySelect:focus { border-color: var(--primary-accent);}
    .chart-card canvas { width: 99% !important; background: transparent !important; }
    /* Responsive table and modal layouts */
    @media (max-width: 900px) {
      #progressModal > div {
        max-height: 95vh;
        padding: 18px 4vw 19px 4vw;
      }
      .modal-content-bottom {
        flex-wrap: wrap;
        flex-direction: column;
        gap: 24px 0;
      }
    }
    @media (max-width:650px) {
      .container { padding-bottom: 7px; }
      .controls,
      .leaderboard-table-wrap,
      .back-btn { margin-left: 0; margin-right: 0;}
      .leaderboard-header { padding: 32px 4vw 17px 4vw;}
      .controls      { padding: 17px 14px; gap: 9px; }
      .back-btn      { margin-left: 0; margin-right: 0; padding: 10px 15px;}
      canvas         { margin-top: 11px; }
      .modal-content-bottom { gap: 14px 0;}
    }
    @media (max-width:400px) {
      .container, #progressModal > div { padding: 0 !important; }
      .leaderboard-header h1 { font-size: 1.18rem;}
      th, td, input, select { font-size: 11.7px !important; }
    }
  </style>
</head>
<body>
  <div class="container" role="main">
    <section class="leaderboard-header">
      <h1>🏆 Leaderboard</h1>
      <p>Click a username for full course progress details.</p>
    </section>
    <section class="controls" aria-label="Search and filter leaderboard">
      <input type="text" id="searchInput" aria-label="Search user" placeholder="🔍 Search user..." />
      <select id="sortSelect" aria-label="Sort leaderboard">
        <option value="rank">Sort by Rank</option>
        <option value="user">Sort by User</option>
        <option value="score">Sort by Score</option>
      </select>
      <span class="spacer" aria-hidden="true"></span>
      <button class="theme-toggle" aria-pressed="false" aria-label="Toggle dark/light theme" onclick="toggleTheme()">🌙 Toggle Theme</button>
    </section>
    <section class="leaderboard-table-wrap" aria-label="Leaderboard table">
      <table>
        <thead>
          <tr>
            <th scope="col">Rank</th>
            <th scope="col">User</th>
            <th scope="col">Total Tasks</th>
          </tr>
        </thead>
        <tbody id="board" role="rowgroup"></tbody>
      </table>
    </section>
    <canvas id="scoreChart" height="90" role="img" aria-label="Bar chart of total tasks completed by users"></canvas>
    <button class="back-btn" onclick="goHome()">⬅ Back to Dashboard</button>
  </div>

  <!-- Modal -->
  <div id="progressModal" role="dialog" aria-modal="true" aria-labelledby="modalUser" tabindex="-1">
    <div>
      <button class="closeModalBtn" onclick="closeModal()" aria-label="Close modal">&times;</button>
      <div id="modalUser" aria-live="polite">User Progress</div>
      <div class="modal-content-bottom">
        <div class="modal-table-wrap chart-card">
          <table id="progressTable" aria-label="Course-wise progress table" hidden>
            <thead><tr><th>Course Name</th><th>Tasks Completed</th></tr></thead>
            <tbody id="progressTableBody"></tbody>
          </table>
        </div>
        <div class="modal-chart-wrap chart-card">
          <canvas id="userProgressChart" width="360" height="300"></canvas>
        </div>
        <div class="modal-table-wrap chart-card">
          <table id="userCourseProgressTable" aria-label="Course-wise progress vs total table" hidden>
            <thead><tr><th>Course</th><th>Completed</th><th>Total</th></tr></thead>
            <tbody id="userCourseProgressBody"></tbody>
          </table>
        </div>
        <div class="modal-chart-wrap chart-card">
          <canvas id="userCoursePieChart" width="310" height="280"></canvas>
        </div>
        <div class="modal-table-wrap chart-card" style="min-width:260px;max-width:340px;">
          <label for="courseSummarySelect" style="font-weight:600;padding-bottom:5px;display:block;">📚 Select Course:</label>
          <select id="courseSummarySelect" aria-label="Select course to show summary"></select>
          <table id="courseSummaryTable" aria-label="Selected Course Progress">
            <thead><tr><th>Course Name</th><th>Total Tasks</th><th>Completed Tasks</th></tr></thead>
            <tbody>
              <tr>
                <td id="summaryCourse"></td>
                <td id="summaryTotal"></td>
                <td id="summaryCompleted"></td>
              </tr>
            </tbody>
          </table>
        </div>
        <div class="modal-chart-wrap chart-card">
          <canvas id="courseSummaryPie" width="280" height="250"></canvas>
        </div>
      </div>
    </div>
  </div>

<script>
  // Add this Chart.js plugin before any chart rendering
  Chart.register({
    id: 'customBgCard',
    beforeDraw: (chart) => {
      const ctx = chart.canvas.getContext('2d');
      ctx.save();
      ctx.globalCompositeOperation = 'destination-over';
      ctx.fillStyle = getComputedStyle(document.body).getPropertyValue('--card') || '#fff';
      ctx.fillRect(0, 0, chart.width, chart.height);
      ctx.restore();
    }
  });

  let leaderboardData = [];
  let courseTotals = {};
  let currentUserProgress = null;
  let userCoursePieInstance = null;
  let progressChartInstance = null;
  let courseSummaryPieInstance = null;
  const medals = [
    '<span class="rank-medal gold">🥇</span>',
    '<span class="rank-medal silver">🥈</span>',
    '<span class="rank-medal bronze">🥉</span>'
  ];
  const chartCtx = document.getElementById('scoreChart').getContext('2d');
  let scoreChart;

  Chart.register(ChartDataLabels);

  function getInitials(name) {
    if (!name) return "U";
    const parts = name.split(/[ ._]/).filter(Boolean);
    return parts.length === 1 ? parts[0][0].toUpperCase() : (parts[0][0] + parts[1][0]).toUpperCase();
  }

  function renderTable(data) {
    const tbody = document.getElementById("board");
    tbody.innerHTML = "";
    data.forEach((userData, i) => {
      tbody.innerHTML += `
        <tr class="${i < 3 ? 'top-row' : ''}">
          <td>${i < 3 ? medals[i] : (i + 1)}</td>
          <td class="user-cell">
            <span class="avatar">${getInitials(userData.user)}</span>
            <a href="#" class="user-link" data-username="${userData.user}" tabindex="0">${userData.user}</a>
          </td>
          <td>${userData.score}</td>
        </tr>
      `;
    });
  }

  function updateChart(data) {
    const labels = data.map(u => u.user);
    const scores = data.map(u => u.score);
    if(scoreChart) scoreChart.destroy();
    scoreChart = new Chart(chartCtx, {
      type: 'bar',
      data: {
        labels,
        datasets: [{
          label: 'Total Tasks Completed',
          data: scores,
          backgroundColor: '#3574e6',
        }],
      },
      options: {
        responsive: true,
        plugins: {
          legend: {display: false}
        },
        scales: {
          y: {
            beginAtZero: true,
            ticks: { stepSize: 1 }
          }
        }
      }
    });
  }

  function applySearchAndSort() {
    const searchTerm = document.getElementById('searchInput').value.trim().toLowerCase();
    const sortValue = document.getElementById('sortSelect').value;

    let filtered = leaderboardData.filter(u => u.user.toLowerCase().includes(searchTerm));
    if(sortValue === "user") {
      filtered.sort((a,b) => a.user.localeCompare(b.user));
    } else if(sortValue === "score") {
      filtered.sort((a,b) => b.score - a.score);
    }

    renderTable(filtered);
    updateChart(filtered);
  }

  async function loadCourseTotals() {
    try {
      const res = await fetch('https://tech-trail-w2ap.onrender.com/courses/meta');
      if(!res.ok) throw new Error("Failed to fetch course totals");
      courseTotals = await res.json();
    } catch {
      // fallback if API down - match your courses with 10 tasks each
      courseTotals = {
        "ai": 10,
        "ml": 10,
        "dl": 10,
        "java": 10,
        "c": 10,
        "html": 10,
        "css": 10,
        "js": 10,
        "js-intermediate": 10,
        "python": 10,
        "dsc": 10
      };
    }
  }

  async function loadBoard() {
    await loadCourseTotals();
    try {
      const res = await fetch('https://tech-trail-w2ap.onrender.com/leaderboard');
      if (!res.ok) throw new Error("Failed to fetch leaderboard");
      leaderboardData = await res.json();
      renderTable(leaderboardData);
      updateChart(leaderboardData);
    } catch(e) {
      document.getElementById("board").innerHTML = `<tr><td colspan="3">⚠️ Failed to load leaderboard.</td></tr>`;
      console.error(e);
    }
  }

  function toggleTheme() {
    const body = document.body;
    body.classList.toggle('dark');
    const themeBtn = document.querySelector('.theme-toggle');
    themeBtn.setAttribute('aria-pressed', body.classList.contains('dark'));
  }

  function goHome() {
    window.location.href = "../index.html";
  }

  function closeModal() {
    if(progressChartInstance) {
      progressChartInstance.destroy();
      progressChartInstance = null;
    }
    if(userCoursePieInstance) {
      userCoursePieInstance.destroy();
      userCoursePieInstance = null;
    }
    if(courseSummaryPieInstance) {
      courseSummaryPieInstance.destroy();
      courseSummaryPieInstance = null;
    }
    document.getElementById('progressModal').style.display = 'none';
  }

  function renderCourseTaskTable() {
    if(!currentUserProgress) return;
    const table = document.getElementById('userCourseProgressTable');
    const tbody = document.getElementById('userCourseProgressBody');
    tbody.innerHTML = "";
    Object.entries(courseTotals).forEach(([course, total])=>{
      const completed = currentUserProgress[course] ? currentUserProgress[course].length : 0;
      tbody.innerHTML += `<tr data-course="${course}"><td>${course}</td><td>${completed}</td><td>${total}</td></tr>`;
    });
    table.hidden = false;
  }

  function renderUserCoursePieChart(course) {
    if(!courseTotals[course]) return;
    const completed = currentUserProgress[course] ? currentUserProgress[course].length : 0;
    const total = courseTotals[course];
    const remaining = Math.max(total - completed, 0);

    const ctx = document.getElementById('userCoursePieChart').getContext('2d');
    if(userCoursePieInstance) userCoursePieInstance.destroy();

    userCoursePieInstance = new Chart(ctx, {
      type: 'pie',
      data: {
        labels: ['Completed', 'Remaining'],
        datasets: [{
          data: [completed, remaining],
          backgroundColor: ['#56b881', '#ddd']
        }]
      },
      options: {
        responsive: true,
        plugins: {
          legend: { display: true, position:'bottom' },
          datalabels: {
            color: '#222',
            formatter: val => val
          }
        }
      },
      plugins: [ChartDataLabels]
    });
  }

  function renderProgressChart() {
    if (!currentUserProgress) return;
    const ctx = document.getElementById('userProgressChart').getContext('2d');
    if(progressChartInstance){
      progressChartInstance.destroy();
      progressChartInstance = null;
    }

    const labels = Object.keys(currentUserProgress);
    const data = labels.map(c => currentUserProgress[c].length);
    const bgColors = [
      '#3574e6', '#56b881', '#ef476f', '#ffd166',
      '#06d6a0', '#118ab2', '#b388eb', '#f78fb3'
    ];

    progressChartInstance = new Chart(ctx, {
      type: 'pie',
      data: {
        labels: labels.length > 0 ? labels : ['No Progress'],
        datasets: [{
          data: data.length > 0 ? data : [1],
          backgroundColor: bgColors.slice(0, labels.length),
        }]
      },
      options: {
        responsive: true,
        plugins: {
          legend: {display: true, position: 'bottom'},
          datalabels: {
            color: '#fff',
            font: {weight: 'bold', size: 14},
            formatter: (value, context) => {
              const total = context.chart._metasets[context.datasetIndex].total;
              if(total === 0) return '0%';
              return ((value / total) * 100).toFixed(1) + '%';
            }
          }
        }
      },
      plugins: [ChartDataLabels]
    });
  }

  function updateCourseSummaryDropdown() {
    const select = document.getElementById('courseSummarySelect');
    select.innerHTML = '';
    Object.keys(courseTotals).forEach(course => {
      const opt = document.createElement('option');
      opt.value = course;
      opt.textContent = course;
      select.appendChild(opt);
    });
    if(Object.keys(courseTotals).length > 0) {
      select.value = Object.keys(courseTotals)[0];
      document.getElementById('courseSummaryTable').style.display = '';
    }
  }

  function updateCourseSummary(course) {
    if(!currentUserProgress){
      document.getElementById('courseSummaryTable').style.display = 'none';
      if(courseSummaryPieInstance){
        courseSummaryPieInstance.destroy();
        courseSummaryPieInstance = null;
      }
      return;
    }
    document.getElementById('courseSummaryTable').style.display = '';
    const total = courseTotals[course] ?? 0;
    const completed = (currentUserProgress && currentUserProgress[course]) ? currentUserProgress[course].length : 0;
    document.getElementById('summaryCourse').textContent = course;
    document.getElementById('summaryTotal').textContent = total;
    document.getElementById('summaryCompleted').textContent = completed;
    const ctx = document.getElementById('courseSummaryPie').getContext('2d');
    if(courseSummaryPieInstance) courseSummaryPieInstance.destroy();
    courseSummaryPieInstance = new Chart(ctx, {
      type: 'pie',
      data: {
        labels: ['Completed', 'Remaining'],
        datasets: [{
          data: [completed, total - completed],
          backgroundColor: ['#56b881', '#dbdef8']
        }]
      },
      options: {
        responsive: true,
        plugins: {
          legend: {display: true, position: 'bottom'},
          datalabels: {
            color: '#23263a',
            font: {weight: 'bold'},
            formatter: v => v,
          }
        }
      },
      plugins: [ChartDataLabels]
    });
  }

  async function loadUserProgress(username){
    const modalUser = document.getElementById('modalUser');
    modalUser.textContent = `Course Progress for ${username}`;
    const modal = document.getElementById('progressModal');
    modal.style.display = 'flex';
    currentUserProgress = null;
    const progressTable = document.getElementById('progressTable');
    const progressTableBody = document.getElementById('progressTableBody');
    progressTable.hidden = true;
    progressTableBody.innerHTML = '';
    document.getElementById('userCourseProgressTable').hidden = true;
    if(userCoursePieInstance){
      userCoursePieInstance.destroy();
      userCoursePieInstance = null;
    }
    document.getElementById('userCoursePieChart').getContext('2d').clearRect(0,0,310,280);
    document.getElementById('courseSummaryTable').style.display = 'none';
    document.getElementById('courseSummaryPie').getContext('2d').clearRect(0,0,280,250);
    if(courseSummaryPieInstance){
      courseSummaryPieInstance.destroy();
      courseSummaryPieInstance = null;
    }
    document.getElementById('courseSummarySelect').innerHTML = '';
    try {
      const res = await fetch(`https://tech-trail-w2ap.onrender.com/progress/${encodeURIComponent(username)}`);
      if(!res.ok) throw new Error("Failed to fetch user progress");
      const prog = await res.json();
      currentUserProgress = prog;
      const courses = Object.keys(prog);
      if(courses.length === 0) {
        progressTableBody.innerHTML = `<tr><td colspan="2">No task progress found for this user.</td></tr>`;
      } else {
        progressTableBody.innerHTML = courses.map(course => {
          const taskCount = prog[course].length;
          return `<tr><td>${course}</td><td>${taskCount}</td></tr>`;
        }).join('');
      }
      progressTable.hidden = false;
      renderProgressChart();
      renderCourseTaskTable();
      // Pick a default course for pie chart (prefer one with data)
      let firstCourse = Object.keys(courseTotals)[0];
      if(courses.length>0){
        for(const c of courses){
          if(courseTotals[c] !== undefined){
            firstCourse = c;
            break;
          }
        }
      }
      renderUserCoursePieChart(firstCourse);
      // Setup click handlers on course progress rows to update pie chart
      setTimeout(() => {
        Array.from(document.querySelectorAll('#userCourseProgressBody tr')).forEach(row => {
          row.onclick = () => {
            const course = row.getAttribute('data-course');
            renderUserCoursePieChart(course);
          };
          row.style.cursor = 'pointer';
          row.setAttribute('tabindex', '0');
          row.addEventListener('keydown', (e) => {
            if(e.key === 'Enter' || e.key === ' ') {
              e.preventDefault();
              const course = e.currentTarget.getAttribute('data-course');
              renderUserCoursePieChart(course);
            }
          });
        });
      }, 0);
      // Setup course summary dropdown and show initial summary data
      updateCourseSummaryDropdown();
      const dropdown = document.getElementById('courseSummarySelect');
      if(dropdown.value) updateCourseSummary(dropdown.value);
    } catch(e) {
      progressTableBody.innerHTML = `<tr><td colspan="2" style="color:#ea5252;">Failed to load progress data.</td></tr>`;
      progressTable.hidden = false;
      console.error(e);
    }
  }

  // Event listeners

  document.addEventListener('click', function(e){
    if(e.target.classList.contains('user-link')){
      e.preventDefault();
      loadUserProgress(e.target.getAttribute('data-username'));
    }
  });

  document.getElementById("searchInput").addEventListener("input", applySearchAndSort);
  document.getElementById("sortSelect").addEventListener("change", applySearchAndSort);

  document.addEventListener('change', function(e){
    if(e.target.id === 'courseSummarySelect'){
      updateCourseSummary(e.target.value);
    }
  });

  loadBoard();
</script>
</body>
</html>

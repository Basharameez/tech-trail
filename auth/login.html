<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Sign In - Tech In My Style</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    /* Reset and base */
    *, *::before, *::after {
      box-sizing: border-box;
    }
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      background: linear-gradient(135deg, #38ef7d, #11998e);
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      color: #333;
    }
    .login-container {
      background: #fff;
      padding: 40px 36px;
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.1);
      width: 360px;
      max-width: 90vw;
      text-align: center;
    }
    h2 {
      color: #11998e;
      margin-bottom: 24px;
      font-weight: 700;
      font-size: 2rem;
      letter-spacing: 1px;
      user-select: none;
    }
    form {
      display: flex;
      flex-direction: column;
      gap: 18px;
    }
    label {
      font-size: 0.9rem;
      font-weight: 600;
      margin-bottom: 6px;
      text-align: left;
      user-select: none;
      color: #347a5d;
    }
    input[type="text"], input[type="password"] {
      padding: 12px 14px;
      font-size: 1rem;
      border: 2px solid #adebad;
      border-radius: 8px;
      transition: border-color 0.3s ease;
      outline-offset: 2px;
    }
    input[type="text"]:focus, input[type="password"]:focus {
      border-color: #28a745;
      outline: none;
      box-shadow: 0 0 5px #28a745aa;
    }
    button {
      padding: 14px;
      font-size: 1.1rem;
      font-weight: 700;
      color: white;
      background: linear-gradient(135deg, #28a745, #19692c);
      border: none;
      border-radius: 12px;
      cursor: pointer;
      user-select: none;
      transition: background-color 0.3s ease;
    }
    button:disabled {
      background: #95d195;
      cursor: default;
    }
    button:hover:not(:disabled) {
      background: linear-gradient(135deg, #19692c, #28a745);
    }
    #status {
      margin-top: 14px;
      min-height: 20px;
      font-weight: 600;
      font-size: 0.95rem;
      user-select: none;
    }
    a {
      margin-top: 22px;
      display: inline-block;
      font-size: 0.9rem;
      color: #11998e;
      text-decoration: none;
      user-select: none;
      transition: color 0.3s ease;
    }
    a:hover {
      color: #0d6b44;
      text-decoration: underline;
    }
    @media (max-width: 400px) {
      .login-container {
        padding: 30px 24px;
      }
      button {
        font-size: 1rem;
      }
      h2 {
        font-size: 1.6rem;
      }
    }
  </style>
</head>
<body>
  <div class="login-container" role="main" aria-label="Login Form">
    <h2>Sign In</h2>
    <form id="loginForm" onsubmit="event.preventDefault(); login();">
      <div>
        <label for="username">Username</label>
        <input type="text" id="username" autocomplete="username" required aria-required="true" aria-describedby="status" />
      </div>
      <div>
        <label for="password">Password</label>
        <input type="password" id="password" autocomplete="current-password" required aria-required="true" />
      </div>
      <button type="submit" id="loginBtn">Sign In</button>
    </form>
    <p id="status" role="alert" aria-live="polite"></p>
    <a href="register.html">Don't have an account? Sign Up</a>
  </div>

  <script>
    const loginBtn = document.getElementById('loginBtn');
    const status = document.getElementById('status');

    async function login() {
      const usernameInput = document.getElementById('username');
      const passwordInput = document.getElementById('password');
      const username = usernameInput.value.trim();
      const password = passwordInput.value;

      if (!username || !password) {
        status.style.color = '#e63946'; // red
        status.textContent = 'Please enter both username and password.';
        return;
      }

      loginBtn.disabled = true;
      status.style.color = '#333';
      status.textContent = 'Signing in...';

      try {
        const response = await fetch('http://127.0.0.1:8000/login', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({ username, password })
        });
        const data = await response.json();

        if (data.message === 'success') {
          // Save username and logged-in flag only
          localStorage.setItem('username', data.username);
          localStorage.setItem('isLoggedIn', 'true');

          status.style.color = '#28a745';  // green
          status.textContent = 'Login successful! Redirecting...';

          setTimeout(() => {
            window.location.href = '../index.html';
          }, 1200);
        } else {
          status.style.color = '#e63946';
          status.textContent = data.message || 'Invalid username or password.';
          loginBtn.disabled = false;
        }
      } catch (error) {
        console.error('Login request failed:', error);
        status.style.color = '#e63946';
        status.textContent = 'Server error, please try again later.';
        loginBtn.disabled = false;
      }
    }
  </script>
</body>
</html>

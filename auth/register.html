<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Signup - Tech In My Style</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    :root {
      --primary-color: #2d6ba9;
      --accent-color: #007bff;
      --gradient: linear-gradient(135deg, #4facfe, #00f2fe);
      --light-bg: #f5f9ff;
      --input-border: #cbd5e0;
      --error-color: #e63946;
      --success-color: #2ecc71;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Segoe UI", sans-serif;
      background: var(--light-bg);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }
    .form-box {
      background: #fff;
      padding: 36px 30px;
      border-radius: 16px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
      width: 360px;
    }
    .form-box h2 {
      text-align: center;
      color: var(--primary-color);
      margin-bottom: 24px;
    }
    .input-group {
      position: relative;
      margin-bottom: 20px;
    }
    .input-group input {
      width: 100%;
      padding: 12px 14px;
      font-size: 15px;
      border: 1px solid var(--input-border);
      border-radius: 8px;
    }
    .input-group label {
      position: absolute;
      top: 50%;
      left: 14px;
      transform: translateY(-50%);
      background: #fff;
      padding: 0 6px;
      font-size: 14px;
      color: #777;
      transition: 0.2s ease;
      pointer-events: none;
    }
    .input-group input:focus + label,
    .input-group input:not(:placeholder-shown) + label {
      top: 0;
      font-size: 12px;
      color: var(--accent-color);
    }
    button {
      width: 100%;
      padding: 12px;
      background: var(--gradient);
      color: white;
      font-size: 16px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }
    #status {
      text-align: center;
      margin-top: 12px;
      font-size: 14px;
    }
    a {
      display: block;
      text-align: center;
      margin-top: 18px;
      font-size: 14px;
      color: #555;
    }
  </style>
</head>
<body>
  <div class="form-box">
    <h2>Create Account</h2>
    <div class="input-group">
      <input id="username" placeholder=" " required />
      <label for="username">Username</label>
    </div>
    <div class="input-group">
      <input id="email" type="email" placeholder=" " required />
      <label for="email">Email</label>
    </div>
    <div class="input-group">
      <input id="password" type="password" placeholder=" " required />
      <label for="password">Password</label>
    </div>
    <button onclick="register()">Sign Up</button>
    <p id="status"></p>
    <a href="login.html">Already have an account? Sign In</a>
  </div>

  <script>
    function register() {
      const username = document.getElementById("username").value.trim();
      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value;
      const status = document.getElementById("status");

      if (!username || !email || !password) {
        status.style.color = "var(--error-color)";
        status.textContent = "Please fill in all fields.";
        return;
      }

      fetch("https://tech-trail-w2ap.onrender.com/register", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ username, email, password })
      })
      .then(res => res.json())
      .then(data => {
        if (data.message === "success") {
          status.style.color = "var(--success-color)";
          status.textContent = "Signup successful! Redirecting...";
          localStorage.setItem("username", username);
          setTimeout(() => window.location.href = "login.html", 1000);
        } else {
          status.style.color = "var(--error-color)";
          status.textContent = data.message;
        }
      })
      .catch(() => {
        status.style.color = "var(--error-color)";
        status.textContent = "Server error. Please try again.";
      });
    }
  </script>
</body>
</html>
